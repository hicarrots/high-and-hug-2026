<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woori High :: 2026 High & Hug</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --dark: #1a1a2e;
    --bar-h: 52px;
    --card-w: 280px;
    --card-gap: 20px;
    --c0: #e07a5f;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--dark);
    color: #fff;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  /* 모바일에서 스크롤 허용 */
  @media (max-width: 768px) {
    body { overflow: hidden; }
    #stage { overflow: hidden; }
  }

  /* ── 상단 컨트롤 바 ── */
  #top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--bar-h);
    background: rgba(26,26,46,0.92);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .logo {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 16px;
    letter-spacing: 0.3px;
    color: #fff;
    white-space: nowrap;
  }
  .logo .sep { color: rgba(255,255,255,0.3); margin: 0 5px; }
  .logo .hi  { color: #e07a5f; }
  #slide-info {
    font-size: 12px;
    color: rgba(255,255,255,0.38);
    letter-spacing: 0.3px;
  }
  .controls { display: flex; gap: 10px; align-items: center; }
  .controls button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.2s;
  }
  .controls button:hover { background: rgba(255,255,255,0.22); }
  .controls button.active { background: #e07a5f; border-color: #e07a5f; }

  /* ── 배경 타이포 ── */
  #bg-title {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 28vw;
    line-height: 0.85;
    color: rgba(255,255,255,0.025);
    white-space: nowrap;
    pointer-events: none;
    z-index: 0;
    user-select: none;
    text-align: center;
  }

  /* ── 슬라이드 영역 ── */
  #stage {
    position: fixed;
    top: var(--bar-h);
    left: 0; right: 0; bottom: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  /* ── 슬라이드 ── */
  .slide {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    padding: 20px 40px 12px;
    animation: fadeIn 0.55s ease;
  }
  .slide.active { display: flex; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── 그룹 헤더 ── */
  .group-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 22px;
    width: 100%;
    max-width: 1820px;
  }
  .group-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .group-title {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 1.5px;
    opacity: 0.75;
  }

  /* ── 카드 그리드: 가운데 정렬, 최대 5열 ── */
  .card-grid {
    display: flex;
    flex-wrap: wrap;
    gap: var(--card-gap);
    justify-content: center;
    align-items: flex-start;
    align-content: center;
    max-width: calc(5 * var(--card-w) + 4 * var(--card-gap));
    width: 100%;
  }

  /* 바나바팀: 4열 기준으로 max-width 제한 → 4+2 배치 */
  .card-grid.barnabas {
    max-width: calc(4 * var(--card-w) + 3 * var(--card-gap));
  }

  /* ── 퍼소나 카드 (고정 크기) ── */
  .card {
    width: var(--card-w);
    flex-shrink: 0;
    background: var(--cream);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 28px rgba(0,0,0,0.38);
    transition: transform 0.22s ease, box-shadow 0.22s ease;
  }
  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 16px 44px rgba(0,0,0,0.52);
  }

  /* 1:1 사진 */
  .card-photo {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    object-position: top center;
    display: block;
    background: #ccc;
    image-orientation: from-image;
  }

  /* 카드 하단 — 가운데 정렬 */
  .card-body {
    padding: 16px 14px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 6px;
    background: var(--cream);
    border-top: 4px solid var(--accent, #e07a5f);
  }

  /* 이름 */
  .card-name {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 26px;
    color: #1a1a2e;
    line-height: 1.15;
    word-break: keep-all;
  }

  /* 직분 서브텍스트 */
  .card-part {
    font-size: 15px;
    color: rgba(26,26,46,0.42);
    line-height: 1.3;
    word-break: keep-all;
  }

  /* 키워드 pill */
  .card-keyword {
    display: inline-flex;
    align-items: center;
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    background: var(--accent, #e07a5f);
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: 0.15px;
    margin-top: 6px;
  }

  /* ── 콜라보 슬라이드 ── */
  .slide.collab {
    justify-content: center;
    padding: 10px 20px 8px;
  }
  .slide.collab .group-header { margin-bottom: 10px; }
  .slide.collab .group-title { font-size: 20px; }
  .slide.collab .group-dot { width: 10px; height: 10px; }
  .collab-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    align-items: flex-start;
    width: 100%;
    max-width: 1860px;
  }
  .card-sm {
    flex-shrink: 0;
    background: var(--cream);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 4px 14px rgba(0,0,0,0.32);
    transition: transform 0.2s ease;
  }
  .card-sm:hover { transform: translateY(-3px); }
  .card-sm .card-photo {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    object-position: top center;
    display: block;
    background: #ccc;
    image-orientation: from-image;
  }
  .card-sm .card-body {
    padding: 6px 6px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 3px;
    background: var(--cream);
    border-top: 3px solid var(--accent, #e07a5f);
  }
  .card-sm .card-name {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 13px;
    color: #1a1a2e;
    line-height: 1.1;
    word-break: keep-all;
  }
  .card-sm .card-part {
    font-size: 9px;
    color: rgba(26,26,46,0.42);
    line-height: 1.2;
    word-break: keep-all;
  }
  .card-sm .card-keyword {
    display: inline-flex;
    align-items: center;
    padding: 2px 7px;
    border-radius: 20px;
    font-size: 9px;
    font-weight: 700;
    color: #fff;
    background: var(--accent, #e07a5f);
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: 2px;
  }

  /* ── 프로그레스 바 ── */
  #progress-wrap {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: rgba(255,255,255,0.08);
    z-index: 100;
  }
  #progress-bar {
    height: 100%;
    background: #e07a5f;
    width: 0%;
    transition: width linear;
  }

  /* ── 모바일 반응형 ── */
  @media (max-width: 768px) {
    :root {
      --card-w: calc((100vw - 48px) / 2);
      --card-gap: 10px;
      --bar-h: 44px;
    }
    .logo { font-size: 12px; }
    .logo .sep { margin: 0 3px; }
    #slide-info { font-size: 11px; }
    .controls { gap: 6px; }
    .controls button { padding: 4px 10px; font-size: 11px; }
    #btn-fs { display: none; }
    .slide { padding: 12px 12px 8px; }
    .group-header { margin-bottom: 12px; gap: 8px; }
    .group-title { font-size: 14px; letter-spacing: 0.5px; }
    .group-dot { width: 8px; height: 8px; }
    .card-grid {
      max-width: 100%;
      gap: var(--card-gap);
      align-content: flex-start;
      overflow-y: auto;
      max-height: calc(100vh - var(--bar-h) - 60px);
    }
    .card-grid.barnabas { max-width: 100%; }
    .card { border-radius: 10px; }
    .card-body { padding: 8px 8px 10px; gap: 4px; }
    .card-name { font-size: 14px; }
    .card-part { font-size: 10px; }
    .card-keyword { font-size: 10px; padding: 3px 10px; margin-top: 2px; }
    .slide.collab { padding: 8px 8px 6px; overflow-y: auto; }
    .collab-grid { gap: 6px; }
    .slide.collab .group-title { font-size: 13px; }
    #bg-title { font-size: 50vw; }
  }

  @media (max-width: 480px) {
    :root {
      --card-w: calc((100vw - 36px) / 2);
      --card-gap: 8px;
    }
    .logo { font-size: 11px; }
  }
</style>
</head>

/* ══════════════════════════════════
   CSV 파서
══════════════════════════════════ */
function parseLine(line) {
  const cols = [];
  let cur = '', inQ = false;
  for (const c of line.trim()) {
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
    cur += c;
  }
  cols.push(cur.trim());
  return { name: cols[0]||'', category: cols[1]||'', part: cols[2]||'', keyword: cols[3]||'', photos: cols[4]||'' };
}

const CLERGY_ORDER = ['양현서', '하윤호', '박규현', '임희선'];

function detectGrade(p) {
  if (/^1_1_/.test(p.photos) || /^2_1_/.test(p.photos)) return '1';
  if (/^1_2_/.test(p.photos) || /^2_2_/.test(p.photos)) return '2';
  if (/^1_3_/.test(p.photos) || /^2_3_/.test(p.photos)) return '3';
  if (p.part.includes('1학년') || /\b1-\d/.test(p.part)) return '1';
  if (p.part.includes('2학년') || /\b2-\d/.test(p.part)) return '2';
  if (p.part.includes('3학년') || /\b3학년/.test(p.part)) return '3';
  return 'etc';
}

/* ══════════════════════════════════
   슬라이드 목록 생성
══════════════════════════════════ */
function buildSlides(people) {
  const slides = [];
  const PAGE = 12;

  // ── 교역자 ──
  const clergy = [...people.filter(p => p.category.includes('교역자') || p.category.includes('부장단'))]
    .sort((a, b) => {
      const ia = CLERGY_ORDER.indexOf(a.name), ib = CLERGY_ORDER.indexOf(b.name);
      return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
    });
  if (clergy.length) {
    slides.push({ label: '교역자 · 부장단', color: '#e07a5f', members: clergy, gridClass: '' });
  }

  // ── 스탭 ──
  // 바나바팀: 6명 → 4+2 배치 (barnabas 클래스로 4열 제한)
  const staffGroups = [
    { label: '스탭 · 예배 & 찬양', color: '#9b72cf', page: 10, gridClass: '',
      match: p => p.part.includes('찬양') || p.part.includes('예배') },
    { label: '스탭 · 미디어 & 디자인', color: '#4db6d0', page: PAGE, gridClass: '',
      match: p => p.part.includes('미디어') || p.part.includes('디자인') || p.part.includes('기획') || p.part.includes('행정') },
    { label: '스탭 · 바나바팀', color: '#6bb38e', page: PAGE, gridClass: 'barnabas',
      match: p => p.part.includes('바나바') || p.part === '스탭' },
    { label: '스탭', color: '#7b8ec8', page: PAGE, gridClass: '', match: () => true },
  ];
  const staffAll = people.filter(p => p.category === '스탭');
  const staffAssigned = new Set();
  for (const sg of staffGroups) {
    const members = staffAll.filter(p => !staffAssigned.has(p._idx) && sg.match(p));
    if (!members.length) continue;
    members.forEach(p => staffAssigned.add(p._idx));
    for (let i = 0; i < members.length; i += sg.page) {
      slides.push({ label: sg.label, color: sg.color, members: members.slice(i, i + sg.page), gridClass: sg.gridClass });
    }
  }

  // ── 1부 교사 ──
  const t1 = people.filter(p => p.category === '1부 교사');
  const t1_colors = { '1': '#81b29a', '2': '#5d9e7a', '3': '#3a7d55', 'etc': '#2a5e3f' };
  const t1_labels = { '1': '1부 교사 · 1학년', '2': '1부 교사 · 2학년', '3': '1부 교사 · 3학년', 'etc': '1부 교사 · 지원' };
  for (const grade of ['1', '2', '3', 'etc']) {
    const members = t1.filter(p => detectGrade(p) === grade);
    if (!members.length) continue;
    for (let i = 0; i < members.length; i += PAGE) {
      slides.push({ label: t1_labels[grade], color: t1_colors[grade], members: members.slice(i, i + PAGE), gridClass: '' });
    }
  }

  // ── 2부 교사 ──
  const t2 = people.filter(p => p.category === '2부 교사');
  const t2_colors = { '1': '#f2cc8f', '2': '#e8a84a', '3': '#d4862a', 'etc': '#b86e1a' };
  const t2_labels = { '1': '2부 교사 · 1학년', '2': '2부 교사 · 2학년', '3': '2부 교사 · 3학년', 'etc': '2부 교사 · 지원' };
  for (const grade of ['1', '2', '3', 'etc']) {
    const members = t2.filter(p => detectGrade(p) === grade);
    if (!members.length) continue;
    for (let i = 0; i < members.length; i += PAGE) {
      slides.push({ label: t2_labels[grade], color: t2_colors[grade], members: members.slice(i, i + PAGE), gridClass: '' });
    }
  }

  return slides;
}

/* ══════════════════════════════════
   사진 Fallback
══════════════════════════════════ */
function handleImgError(img, name, idx) {
  const exts = ['png', 'jpeg', 'webp'];
  if (idx < exts.length) {
    img.src = `photos/${name}.${exts[idx]}`;
    img.onerror = () => handleImgError(img, name, idx + 1);
  } else {
    img.src = 'photos/default.jpg';
    img.onerror = null;
  }
}

/* ══════════════════════════════════
   카드 생성 (공용)
══════════════════════════════════ */
function makeCard(person, color, size = 'normal') {
  const card = document.createElement('div');
  card.className = size === 'sm' ? 'card-sm' : 'card';
  card.style.setProperty('--accent', color);

  const img = document.createElement('img');
  img.className = 'card-photo';
  img.alt = person.name;
  img.src = `photos/${person.photos}.jpg`;
  img.onerror = () => handleImgError(img, person.photos, 0);

  const body = document.createElement('div');
  body.className = 'card-body';

  const nameEl = document.createElement('div');
  nameEl.className = 'card-name';
  nameEl.textContent = person.name;
  body.appendChild(nameEl);

  if (size !== 'sm') {
    const partText = (person.part && person.part !== '*') ? person.part : '';
    if (partText) {
      const partEl = document.createElement('div');
      partEl.className = 'card-part';
      partEl.textContent = partText;
      body.appendChild(partEl);
    }
    const kw = (person.keyword && person.keyword !== '.' && person.keyword !== '*') ? person.keyword : '';
    if (kw) {
      const kwEl = document.createElement('div');
      kwEl.className = 'card-keyword';
      kwEl.textContent = kw;
      body.appendChild(kwEl);
    }
  }

  card.appendChild(img);
  card.appendChild(body);
  return card;
}

/* ══════════════════════════════════
   일반 슬라이드 렌더링
══════════════════════════════════ */
function renderSlides(slideData) {
  const stage = document.getElementById('stage');
  stage.innerHTML = '';

  slideData.forEach((sd, slideIdx) => {
    const slide = document.createElement('div');
    slide.className = 'slide' + (slideIdx === 0 ? ' active' : '');

    const hdr = document.createElement('div');
    hdr.className = 'group-header';
    hdr.innerHTML = `
      <div class="group-dot" style="background:${sd.color}"></div>
      <div class="group-title">${sd.label}</div>
    `;
    slide.appendChild(hdr);

    const grid = document.createElement('div');
    grid.className = 'card-grid' + (sd.gridClass ? ' ' + sd.gridClass : '');

    sd.members.forEach(person => {
      grid.appendChild(makeCard(person, sd.color, 'normal'));
    });

    slide.appendChild(grid);
    stage.appendChild(slide);
  });
}

/* ══════════════════════════════════
   콜라보 슬라이드
══════════════════════════════════ */
const COLLAB_DEFS = [
  { label: '1부 교사', color: '#4a9e78', filter: p => p.category === '1부 교사' },
  { label: '2부 교사', color: '#d4862a', filter: p => p.category === '2부 교사' },
  { label: '스탭',     color: '#7b72cf', filter: p => p.category === '스탭' },
];

function makeCollabSlide(members, label, color, nameOnly) {
  const n = members.length;
  const GAP = 6;
  const AVAIL_W = 1880;
  const AVAIL_H = 860;
  const BODY_H = nameOnly ? 30 : 65;

  let bestW = 40;
  for (let cols = 1; cols <= n; cols++) {
    const rows = Math.ceil(n / cols);
    const w = Math.floor((AVAIL_W - GAP * (cols - 1)) / cols);
    const totalH = rows * (w + BODY_H) + GAP * (rows - 1);
    if (totalH <= AVAIL_H && w > bestW) bestW = w;
  }
  const cardW = Math.min(bestW, nameOnly ? 100 : 160);

  const slide = document.createElement('div');
  slide.className = 'slide collab';

  const hdr = document.createElement('div');
  hdr.className = 'group-header';
  hdr.innerHTML = `
    <div class="group-dot" style="background:${color};width:10px;height:10px;border-radius:50%;flex-shrink:0;"></div>
    <div class="group-title" style="font-size:18px;opacity:0.75;">${label}</div>
  `;
  slide.appendChild(hdr);

  const grid = document.createElement('div');
  grid.className = 'collab-grid';
  grid.style.gap = GAP + 'px';

  const catColor = {
    '교역자 / 부장단': '#e07a5f',
    '스탭': '#9b72cf',
    '1부 교사': '#4a9e78',
    '2부 교사': '#d4862a',
  };

  members.forEach(person => {
    const accent = nameOnly ? (catColor[person.category] || '#aaa') : color;
    const card = makeCard(person, accent, 'sm');
    card.style.width = cardW + 'px';

    if (nameOnly) {
      const body = card.querySelector('.card-body');
      const name = body.querySelector('.card-name');
      body.innerHTML = '';
      body.style.padding = '4px 4px 6px';
      name.style.fontSize = Math.max(9, Math.min(13, cardW * 0.13)) + 'px';
      body.appendChild(name);
    }

    grid.appendChild(card);
  });

  slide.appendChild(grid);
  return slide;
}

function renderCollabSlides(people) {
  const stage = document.getElementById('stage');

  COLLAB_DEFS.forEach(cd => {
    const members = people.filter(cd.filter);
    if (!members.length) return;
    stage.appendChild(makeCollabSlide(members, cd.label, cd.color, false));
  });

  const ORDER = ['교역자 / 부장단', '스탭', '1부 교사', '2부 교사'];
  const allSorted = [...people].sort((a, b) => {
    const ia = ORDER.indexOf(a.category), ib = ORDER.indexOf(b.category);
    return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
  });
  stage.appendChild(makeCollabSlide(allSorted, 'High &amp; Hug 2026', '#e07a5f', true));
}

/* ══════════════════════════════════
   컨트롤러
══════════════════════════════════ */
let current = 0, timer = null, isPlaying = true;
const INTERVAL = 8500;

const allSlides = () => document.querySelectorAll('.slide');

function goTo(idx) {
  const sl = allSlides();
  sl[current]?.classList.remove('active');
  current = ((idx % sl.length) + sl.length) % sl.length;
  sl[current]?.classList.add('active');
  document.getElementById('slide-info').textContent = `${current + 1} / ${sl.length}`;
  resetProgress();
}

function resetProgress() {
  const bar = document.getElementById('progress-bar');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    bar.style.transition = `width ${INTERVAL}ms linear`;
    bar.style.width = isPlaying ? '100%' : '0%';
  }));
}

function play() {
  isPlaying = true;
  document.getElementById('btn-play').textContent = '⏸';
  document.getElementById('btn-play').classList.add('active');
  resetProgress();
  timer = setInterval(() => goTo(current + 1), INTERVAL);
}

function pause() {
  isPlaying = false;
  document.getElementById('btn-play').textContent = '▶';
  document.getElementById('btn-play').classList.remove('active');
  clearInterval(timer);
  const bar = document.getElementById('progress-bar');
  bar.style.transition = 'none';
  bar.style.width = '0%';
}

function nav(delta) {
  clearInterval(timer);
  goTo(current + delta);
  if (isPlaying) timer = setInterval(() => goTo(current + 1), INTERVAL);
}

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
(function init() {
  const people = RAW_LINES.map((l, i) => ({ ...parseLine(l), _idx: i }));

  const seen = new Set();
  const unique = people.filter(p => {
    const k = p.name + '|' + p.photos;
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  });

  const slideData = buildSlides(unique);
  renderSlides(slideData);
  renderCollabSlides(unique);

  const sl = allSlides();
  document.getElementById('slide-info').textContent = `1 / ${sl.length}`;

  document.getElementById('btn-play').addEventListener('click', () => isPlaying ? pause() : play());
  document.getElementById('btn-prev').addEventListener('click', () => nav(-1));
  document.getElementById('btn-next').addEventListener('click', () => nav(1));
  document.getElementById('btn-fs').addEventListener('click', () => {
    document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  nav(-1);
    if (e.key === 'ArrowRight') nav(1);
    if (e.key === ' ') { e.preventDefault(); isPlaying ? pause() : play(); }
  });

  // 터치 스와이프
  let touchStartX = 0;
  document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) { dx < 0 ? nav(1) : nav(-1); }
  });

  play();
})();
</script>
